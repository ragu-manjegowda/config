# ░█▀█░▀█▀░█▀▀░█▀█░█▄█░░░░█▀▀░█▀█░█▀█░█▀▀
# ░█▀▀░░█░░█░░░█░█░█░█░░░░█░░░█░█░█░█░█▀▀
# ░▀░░░▀▀▀░▀▀▀░▀▀▀░▀░▀░▀░░▀▀▀░▀▀▀░▀░▀░▀░░
#
#  X compositor configuration

# ░█▀▀░█░█░█▀█░█▀▄░█▀█░█░█
# ░▀▀█░█▀█░█▀█░█░█░█░█░█▄█
# ░▀▀▀░▀░▀░▀░▀░▀▀░░▀▀▀░▀░▀

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -12;
shadow-offset-y = -12;

# shadow-red = 0
# shadow-green = 0
# shadow-blue = 0
shadow-color = "#000000";

# shadow-exclude-reg = "x10+0+0";
# xinerama-shadow-crop = true;

# ░█▀▀░█▀█░█▀▄░▀█▀░█▀█░█▀▀
# ░█▀▀░█▀█░█░█░░█░░█░█░█░█
# ░▀░░░▀░▀░▀▀░░▀▀▀░▀░▀░▀▀▀

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 20;

no-fading-openclose = false;
no-fading-destroyed-argb = true;

# ░█▀█░█▀█░█▀█░█▀▀░▀█▀░▀█▀░█░█
# ░█░█░█▀▀░█▀█░█░░░░█░░░█░░░█░
# ░▀▀▀░▀░░░▀░▀░▀▀▀░▀▀▀░░▀░░░▀░

# Opacity, dimming, shadow exclusions, and per-window-type tweaks are all
# handled by the unified `rules` block below (picom v13+). Setting any of the
# legacy opacity/focus/wintypes/exclude options would disable `rules` entirely.

# ░█▀▄░█░░░█░█░█▀▄░█▀▄░▀█▀░█▀█░█▀▀
# ░█▀▄░█░░░█░█░█▀▄░█▀▄░░█░░█░█░█░█
# ░▀▀░░▀▀▀░▀▀▀░▀░▀░▀░▀░▀▀▀░▀░▀░▀▀▀

blur: {
	method = "dual_kawase";
    strength = 8;
	deviation = 1.0;
	kernel = "11x11gaussian";
}

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
# blur-kern = "3x3box";

# blur is ON globally; the rules block below turns it OFF for windows that must
# not be blurred (fullscreen awesome scrim, top panel, Codex, chrome, slop).

# ░█▀▀░█▀▀░█▀█░█▀▀░█▀▄░█▀█░█░░░░░█▀▀░█▀▀░▀█▀░▀█▀░▀█▀░█▀█░█▀▀░█▀▀
# ░█░█░█▀▀░█░█░█▀▀░█▀▄░█▀█░█░░░░░▀▀█░█▀▀░░█░░░█░░░█░░█░█░█░█░▀▀█
# ░▀▀▀░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░▀▀▀░░░▀▀▀░▀▀▀░░▀░░░▀░░▀▀▀░▀░▀░▀▀▀░▀▀▀

daemon = false;
backend = "glx";
xrender-sync-fence = true;
vsync = true;
dbus = false;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = false;
# unredir-if-possible = false;
# unredir-if-possible-delay = 0;

detect-transient = false;
detect-client-leader = false;
# resize-damage = 1;

# glx-no-stencil = true;
# glx-no-rebind-pixmap = false;
use-damage = false;
# xrender-sync-fence = true;

# glx-fshader-win = "";
# force-win-blend = false;

# no-ewmh-fullscreen = false;
# max-brightness = 1.0;

transparent-clipping = false;

log-level = "warn";
log-file = "/tmp/picom-log.log";
show-all-xerrors = true;
# write-pid-path = '/path/to/file';

# ░█▀▄░█░█░█░░░█▀▀░█▀▀
# ░█▀▄░█░█░█░░░█▀▀░▀▀█
# ░▀░▀░▀▀▀░▀▀▀░▀▀▀░▀▀▀
#
# picom v13 unified window rules. This supersedes wintypes, opacity-rule,
# inactive-dim, focus-exclude, shadow-exclude and blur-background-exclude:
# if `rules` is set, those legacy options are ignored entirely.
# Rules match top-to-bottom; for any given option the last matching rule wins,
# so general rules come first and specific overrides come last.
rules = (
	# --- per window-type (ported from wintypes) ---
	# Global shadow is ON; only turn it off where a shadow is pointless/ugly
	# (drag icons, the fullscreen scrim/desktop layer).
	{ match = "window_type = 'tooltip'";       fade = true; },
	{ match = "window_type = 'dnd'";           shadow = false; },
	{ match = "window_type = 'popup_menu'";    opacity = 0.90; },
	{ match = "window_type = 'splash'";        fade = false; },
	{ match = "window_type = 'utility'";       blur-background = false; },
	{ match = "window_type = 'desktop'";       blur-background = false; },

	# --- inactive dimming (ported from inactive-dim + focus-exclude) ---
	# Original picom defaulted focus=on for every type except normal/dialog, so
	# only normal/dialog windows were ever dimmed. Replicate that: dim unfocused
	# normal/dialog windows, except the apps that were in focus-exclude.
	{ match = "!focused && (window_type = 'normal' || window_type = 'dialog') && !(class_g = 'firefox' || class_g = 'google-chrome' || class_g = 'librewolf' || class_g = 'Codex-app-linux-bin' || class_g ?= 'rofi')"; dim = 0.4; },

	# --- per-application opacity (ported from opacity-rule) ---
	{ match = "class_g = 'Codex-app-linux-bin'"; opacity = 1.00; },
	{ match = "class_g = 'awesome'";             opacity = 0.80; },
	{ match = "class_g = 'firefox'";             opacity = 0.90; },
	{ match = "class_g = 'librewolf'";           opacity = 0.80; },
	{ match = "class_g = 'Thunar'";              opacity = 0.80; },
	{ match = "class_g = 'sioyek'";              opacity = 0.90; },
	{ match = "class_g = 'Zathura'";             opacity = 0.90; },

	# --- shadow exceptions ---
	# Keep shadows off where they create artifacts: the top panel (a single
	# desktop-type window, so a shadow renders as a line across the islands),
	# the fullscreen scrim, and the screenshot selection overlay.
	{ match = "class_g = 'awesome' && window_type = 'desktop'"; shadow = false; },
	{ match = "class_g = 'awesome' && window_type = 'utility'"; shadow = false; },
	{ match = "class_g = 'slop'";                               shadow = false; },

	# --- blur exclusions (ported from blur-background-exclude) ---
	# Everything else with a transparent frame is blurred (blur-background-frame
	# implies blur); these are the windows that must NOT be blurred.
	{ match = "class_g = 'Codex-app-linux-bin'"; blur-background = false; },
	{ match = "class_g = 'google-chrome'";       blur-background = false; },
	{ match = "class_g = 'slop'";                blur-background = false; },

	# --- THE FIX: blur the Firefox app-menu/hamburger popup ---
	# It is a utility window (excluded above), so re-enable blur just for it.
	{ match = "window_type = 'utility' && class_g = 'firefox'"; blur-background = true; opacity = 0.90; },
);
